name: chaos

on:
  workflow_dispatch:
  schedule:
    - cron: '47 4 * * 3'

jobs:
  local-chaos:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:chaos
