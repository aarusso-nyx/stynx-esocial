name: Contract Release

on:
  push:
    branches:
      - main
    tags:
      - contracts-v*
    paths:
      - packages/contracts/**
      - package-lock.json
      - package.json
      - .github/workflows/release.yml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  contracts:
    name: contracts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run coverage

      - name: Audit
        run: npm audit --omit=dev --audit-level=high

      - name: SBOM
        run: npm run sbom -- --out sbom/contracts-active-services.cdx.json

      - name: Publish Contracts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace @esocial/contracts

      - name: Resolve Version
        id: version
        run: node -e "const p=require('./packages/contracts/package.json'); console.log('version=' + p.version)" >> "$GITHUB_OUTPUT"

      - name: Tag Release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "contracts-v${{ steps.version.outputs.version }}"
          git push origin "contracts-v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "contracts-v${{ steps.version.outputs.version }}" \
            --title "@esocial/contracts ${{ steps.version.outputs.version }}" \
            --notes-file packages/contracts/CHANGELOG.md \
            sbom/contracts-active-services.cdx.json
