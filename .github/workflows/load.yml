name: load

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:load
      - uses: actions/upload-artifact@v4
        with:
          name: load-smoke-evidence
          path: docs/release/1.2.0/load/
