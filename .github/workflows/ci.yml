name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * 0'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install XML schema validator
        run: sudo apt-get update && sudo apt-get install --yes libxml2-utils

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Slim Drift Check
        run: npm run drift:audit

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run coverage

      - name: SBOM
        run: npm run sbom -- --out sbom/contracts-active-services.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: contracts-active-services-sbom
          path: sbom/contracts-active-services.cdx.json
          if-no-files-found: error

  contracts-changelog:
    name: contracts-changelog
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Detect contract changes
        env:
          SKIP_CONTRACT_CHANGELOG: ${{ contains(github.event.pull_request.labels.*.name, 'skip-contract-changelog') }}
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$SKIP_CONTRACT_CHANGELOG" = "true" ]; then
            echo "skip-contract-changelog label present; skipping contract changelog gate."
            exit 0
          fi
          SRC_CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'packages/contracts/src/**' | wc -l)
          CHANGELOG_CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'packages/contracts/CHANGELOG.md' | wc -l)
          if [ "$SRC_CHANGED" -gt 0 ] && [ "$CHANGELOG_CHANGED" -eq 0 ]; then
            echo "::error::packages/contracts/src/** changed but CHANGELOG.md was not updated."
            exit 1
          fi

  mutation-builders:
    name: mutation-builders
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [unit]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Release-critical builder mutation gate
        run: npm run mutation:release-critical

      - name: Upload mutation report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: mutation-report
          path: .stryker-tmp/mutation-report.*
          if-no-files-found: warn

  integration:
    name: integration
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: unit
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-integration'))
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: esocial_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d esocial_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      localstack:
        image: localstack/localstack:3.8
        env:
          SERVICES: sqs,events,secretsmanager,kms,logs
          AWS_DEFAULT_REGION: us-east-1
        ports:
          - 4566:4566
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/esocial_ci
      ESOCIAL_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/esocial_ci
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      LOCALSTACK_ENDPOINT: http://localhost:4566
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Migrate
        run: ESOCIAL_MIGRATE_RESET=1 npm run migrate:dev

      - name: Database Tests
        run: npm run test:db

      - name: Integration Tests
        run: npm run test:integration

      - name: E2E Tests
        run: npm run test:e2e

      - name: LocalStack Harness
        run: npm run integration:localstack

      - name: Template Check
        run: npm run templates:check

      - name: CDK Synth Qualification
        run: npm run cdk:synth:qualification

      - name: CDK Synth Restricted Production
        run: npm run cdk:synth:restricted-production

      - name: CDK IAM Scope Assertion
        run: node scripts/assert-cdk-iam-scoped.mjs
