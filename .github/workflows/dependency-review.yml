name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: dependency-diff
        name: Detect dependency changes
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          import { appendFileSync } from 'node:fs';

          const sections = ['dependencies', 'devDependencies', 'optionalDependencies', 'peerDependencies'];
          const [base, head] = [process.env.BASE, process.env.HEAD];
          const files = execFileSync('git', ['diff', '--name-only', base, head, '--'], { encoding: 'utf8' })
            .trim().split('\n').filter(Boolean);
          const lockChanged = files.some((file) => /(?:^|\/)package-lock\.json$/.test(file));
          const packageChanged = files.filter((file) => /(?:^|\/)package\.json$/.test(file)).some((file) => {
            const read = (ref) => JSON.parse(execFileSync('git', ['show', `${ref}:${file}`], { encoding: 'utf8' }));
            const before = read(base);
            const after = read(head);
            return sections.some((section) => JSON.stringify(before[section] ?? {}) !== JSON.stringify(after[section] ?? {}));
          });
          const changed = lockChanged || packageChanged;
          appendFileSync(process.env.GITHUB_OUTPUT, `changed=${changed}\n`);
          console.log(`dependency changes: ${changed}`);
          NODE
      - name: Dependency Review
        if: steps.dependency-diff.outputs.changed == 'true'
        uses: actions/dependency-review-action@v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          deny-licenses: AGPL-1.0, AGPL-3.0
