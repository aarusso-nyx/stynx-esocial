services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: esocial_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d esocial_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

  localstack:
    image: localstack/localstack:3.8
    environment:
      SERVICES: sqs,events,secretsmanager,kms,logs
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"

  soap-stub:
    image: nginx:1.27-alpine
    volumes:
      - ./docs/templates/wsdl:/usr/share/nginx/html:ro
    ports:
      - "3010:80"

  logs:
    image: node:22-alpine
    working_dir: /workspace
    command: ["sh", "-lc", "tail -f /dev/null"]
    volumes:
      - ./:/workspace:ro
